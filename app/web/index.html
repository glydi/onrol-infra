<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="onrol_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon (branded SVG) -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="alternate icon" type="image/png" href="favicon.png"/>

  <title>ONROL Learn</title>
  <link rel="manifest" href="manifest.json">
  <script>
    // Always-fresh: we build with --pwa-strategy=none (no app service worker), so
    // we evict ANY previously-installed worker + its caches so a deploy is never
    // served stale. (Web Push has been removed, so the old push-sw.js worker is
    // now unregistered too.) Reload once only if a worker was actually evicted.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        var evicted = false;
        regs.forEach(function (r) {
          r.unregister();
          evicted = true;
        });
        if (window.caches && caches.keys) {
          caches.keys().then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); });
        }
        if (evicted) location.reload();
      }).catch(function () {});
    }
  </script>
  <!-- hls.js: enables HLS (.m3u8) streaming in browsers without native support (Chrome/Firefox) -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
  <script>
    // Returns an hls.js xhrSetup that attaches the JWT to the AES-128 key request
    // ONLY (same-origin API). Never added to cross-origin R2 segment requests.
    window.onrolKeyXhrSetup = function (token) {
      return function (xhr, url) {
        if (token && url && url.indexOf('/hls.key') !== -1) {
          xhr.setRequestHeader('Authorization', 'Bearer ' + token);
        }
      };
    };
    // Simulated-live: the playlist AND the key are auth-gated same-origin API
    // routes under /api/v1/me/live/, so attach the JWT to both. Segments live on
    // R2 (a different path) so the token never leaks to the CDN.
    window.onrolLiveXhrSetup = function (token) {
      return function (xhr, url) {
        if (token && url && url.indexOf('/api/v1/me/live/') !== -1) {
          xhr.setRequestHeader('Authorization', 'Bearer ' + token);
        }
      };
    };
    // Simulated-live: fully suppress the OS / browser media notification (lock
    // screen, notification shade, desktop media hub). We (1) clear the metadata
    // so there's NO title / artist / artwork — no evidence a class recording is
    // playing, (2) report "nothing playing" so the notification is dropped where
    // the browser allows, (3) remove EVERY action handler so the notification
    // can't play / pause / seek / skip the stream, and (4) clear any position
    // state (no scrubber). Re-applied every second by the live guard because the
    // browser re-populates the session whenever playback state changes.
    // Live class media session: show a descriptive TITLE in the OS / browser
    // media panel, but make EVERY transport control inert — no pause, no seek,
    // no skip can move or stop a live stream. Re-applied on play and every
    // second, since the browser repopulates the session on state changes.
    window.onrolLiveMediaSession = function (title, artist) {
      try {
        if (!('mediaSession' in navigator)) return;
        var ms = navigator.mediaSession;
        try {
          ms.metadata = new MediaMetadata({
            title: title || 'Live class',
            artist: artist || 'ONROL',
            album: 'Live class'
          });
        } catch (e) {}
        try { ms.playbackState = 'playing'; } catch (e) {}
        // Every action is a NO-OP: play/pause/seek/skip from the notification all
        // do nothing (null would let some browsers keep a working default).
        var noop = function () {};
        ['play', 'pause', 'stop', 'seekbackward', 'seekforward', 'seekto',
         'previoustrack', 'nexttrack', 'skipad', 'togglemicrophone',
         'togglecamera', 'hangup'].forEach(function (a) {
          try { ms.setActionHandler(a, noop); } catch (e) {}
        });
        try { if (ms.setPositionState) ms.setPositionState(); } catch (e) {}
      } catch (e) {}
    };
    // Keep a simulated-live stream from getting permanently stuck: recover from
    // fatal network/media errors instead of dying on them.
    window.onrolLiveGuard = function (hls) {
      try {
        hls.on('hlsError', function (_, data) {
          if (!data || !data.fatal) return;
          if (data.type === 'networkError') { try { hls.startLoad(); } catch (e) {} }
          else { try { hls.recoverMediaError(); } catch (e) {} }
        });
      } catch (e) {}
    };
  </script>
  <script>
    // Discourage downloading streamed video: block right-click "Save video as"
    // on <video> elements, and disable the native download control if present.
    document.addEventListener('contextmenu', function (e) {
      if (e.target && e.target.tagName === 'VIDEO') e.preventDefault();
    }, true);
    new MutationObserver(function () {
      document.querySelectorAll('video').forEach(function (v) {
        v.setAttribute('controlsList', 'nodownload noplaybackrate noremoteplayback');
        v.setAttribute('disablePictureInPicture', 'true');
      });
    }).observe(document.documentElement, { childList: true, subtree: true });
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader

    * https://docs.flutter.dev/platform-integration/web/initialization

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
