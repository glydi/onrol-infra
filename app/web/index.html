<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="onrol_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon (branded SVG) -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="alternate icon" type="image/png" href="favicon.png"/>

  <title>ONROL Learn</title>
  <link rel="manifest" href="manifest.json">
  <script>
    // Always-fresh: we build with --pwa-strategy=none (no service worker), and
    // this kills any previously-installed worker + its caches so a deploy is
    // never served stale. Reloads once if it found a stale worker to evict.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        var had = regs.length > 0;
        regs.forEach(function (r) { r.unregister(); });
        if (window.caches && caches.keys) {
          caches.keys().then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); });
        }
        if (had) location.reload();
      }).catch(function () {});
    }
  </script>
  <!-- hls.js: enables HLS (.m3u8) streaming in browsers without native support (Chrome/Firefox) -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
  <script>
    // Returns an hls.js xhrSetup that attaches the JWT to the AES-128 key request
    // ONLY (same-origin API). Never added to cross-origin R2 segment requests.
    window.onrolKeyXhrSetup = function (token) {
      return function (xhr, url) {
        if (token && url && url.indexOf('/hls.key') !== -1) {
          xhr.setRequestHeader('Authorization', 'Bearer ' + token);
        }
      };
    };
  </script>
  <script>
    // Discourage downloading streamed video: block right-click "Save video as"
    // on <video> elements, and disable the native download control if present.
    document.addEventListener('contextmenu', function (e) {
      if (e.target && e.target.tagName === 'VIDEO') e.preventDefault();
    }, true);
    new MutationObserver(function () {
      document.querySelectorAll('video').forEach(function (v) {
        v.setAttribute('controlsList', 'nodownload noplaybackrate noremoteplayback');
        v.setAttribute('disablePictureInPicture', 'true');
      });
    }).observe(document.documentElement, { childList: true, subtree: true });
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
