<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ONROL · Staff Console</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ============ LOGIN ============ -->
  <div id="login" class="login" hidden>
    <form class="login-card" id="loginForm">
      <div class="brand">ONROL</div>
      <div class="brand-sub">Staff Console</div>
      <label>Email, phone or login&nbsp;ID
        <input id="loginId" autocomplete="username" required />
      </label>
      <label>Password
        <input id="loginPw" type="password" autocomplete="current-password" required />
      </label>
      <button class="btn btn-primary" type="submit" id="loginBtn">Sign in</button>
      <p class="login-err" id="loginErr"></p>
      <p class="login-note">For staff (admin &amp; instructor) only.</p>
    </form>
  </div>

  <!-- ============ APP SHELL ============ -->
  <div id="app" class="app" hidden>
    <aside class="sidebar" id="sidebar"><!-- nav injected by app.js --></aside>
    <div class="main">
      <header class="topbar">
        <button class="icon-btn only-mobile" id="menuBtn" title="Menu">&#9776;</button>
        <div class="crumbs" id="crumbs"></div>
        <div class="spacer"></div>
        <input class="search" id="globalSearch" placeholder="Search students, courses, staff, videos…" />
        <div class="alerts" id="alerts"></div>
        <div class="user" id="userChip"></div>
      </header>
      <main class="content" id="content"><!-- view injected by app.js --></main>
    </div>
  </div>

  <script src="core.js"></script>
  <script src="view-courses.js"></script>
  <script src="view-live.js"></script>
  <script src="view-mentor.js"></script>
  <script src="view-students.js"></script>
  <script src="view-enrollments.js"></script>
  <script src="view-staff.js"></script>
  <script src="view-announcements.js"></script>
  <script src="view-communities.js"></script>
  <script src="view-calendar.js"></script>
  <script src="view-videos.js"></script>
  <script src="view-reports.js"></script>
  <script src="view-assessments.js"></script>
  <script src="view-certificates.js"></script>
  <script src="view-batches.js"></script>
  <script src="view-devices.js"></script>
  <script src="view-roles.js"></script>
  <script src="view-groups.js"></script>
  <script src="view-processing.js"></script>
  <script src="view-search.js"></script>
</body>
</html>
