user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # Trust Cloudflare in front of us; use real client IP for logs/rate limits.
    # (Add Cloudflare IP ranges with set_real_ip_from in production.)
    real_ip_header CF-Connecting-IP;

    # Basic abuse guard. 300 users won't hit this; bots will.
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    upstream api { server api:8080; }

    # HTTP -> HTTPS
    server {
        listen 80;
        server_name _;
        # Allow ACME http-01 challenge if using certbot webroot.
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 10m;

        location / {
            limit_req zone=api burst=40 nodelay;
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket upgrade (live attendance / future use).
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
