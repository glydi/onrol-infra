# Native deploy: existing system nginx terminates TLS and proxies to the Go API
# on 127.0.0.1:8080. Replace DOMAIN with your host (we used a sslip.io name so no
# DNS is needed: 187-127-178-100.sslip.io resolves to the IP).
server {
    listen 80;
    server_name DOMAIN;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl http2;          # older nginx (<1.25.1) syntax; use "http2 on;" on newer
    server_name DOMAIN;
    ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;
    client_max_body_size 10m;
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
