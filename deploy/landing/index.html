<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONROL — Platform</title>
  <meta name="description" content="ONROL platform — choose your portal." />
  <style>
    :root{
      --bg:#0b1020; --card:#11182e; --line:#1e2a47; --ink:#eef2fb; --muted:#9aa7c7;
      --accent:#ff4f2b; --accent2:#2d7df6;
    }
    *{box-sizing:border-box} html,body{margin:0;height:100%}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;
      background:radial-gradient(1200px 600px at 50% -10%, #16203c 0%, var(--bg) 60%);
      color:var(--ink); min-height:100%; display:flex; flex-direction:column;
    }
    .wrap{max-width:1080px; margin:0 auto; padding:64px 24px 48px; width:100%}
    header{display:flex; align-items:center; gap:14px; margin-bottom:8px}
    .logo{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#ff8a5b);
      display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:20px}
    h1{font-size:30px;margin:0;letter-spacing:.5px;font-weight:800}
    .tag{color:var(--muted); margin:6px 0 36px; font-size:15px}
    .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px}
    a.card{
      display:block; text-decoration:none; color:inherit; background:var(--card);
      border:1px solid var(--line); border-radius:12px; padding:20px 20px 18px;
      transition:transform .12s ease, border-color .12s ease, background .12s ease;
    }
    a.card:hover{transform:translateY(-2px); border-color:var(--accent); background:#13203c}
    .card .top{display:flex; align-items:center; gap:12px; margin-bottom:10px}
    .ic{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;
      font-size:18px;background:#1b2747}
    .card h3{margin:0; font-size:17px; font-weight:700}
    .card p{margin:0; color:var(--muted); font-size:13.5px; line-height:1.5}
    .roles{margin-top:12px; font-size:12px; color:#7f8cad}
    .go{margin-top:14px; font-size:13px; font-weight:600; color:var(--accent); display:flex; align-items:center; gap:6px}
    footer{margin-top:auto; padding:24px; text-align:center; color:#6b7799; font-size:12.5px}
    code{background:#1b2747;padding:2px 6px;border-radius:5px;color:#cdd7f2}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">O</div>
      <h1>ONROL</h1>
    </header>
    <p class="tag">Choose your portal. One account — your role decides what you see.</p>

    <div class="grid" id="grid"></div>
  </div>
  <footer>© ONROL · <span id="host"></span> — secure role-based portals</footer>

  <script>
    // Build portal URLs from the current apex host so it works on any domain.
    var host = location.host;                         // e.g. 187-127-178-100.sslip.io
    document.getElementById('host').textContent = host;
    var scheme = location.protocol === 'http:' ? 'http://' : 'https://';
    function url(sub){ return scheme + sub + '.' + host + '/'; }

    var portals = [
      {sub:'lms',        icon:'🎓', name:'LMS',                 desc:'Courses, live classes, assignments, certificates.', roles:'Admin · Mentor · Student', color:'#2d7df6'},
      {sub:'crm',        icon:'📈', name:'CRM',                 desc:'Leads, deals, invoices, campaigns, analytics.',     roles:'Admin', color:'#ff4f2b'},
      {sub:'ambassador', icon:'🎁', name:'Ambassador',          desc:'Referrals, codes and reward tracking.',             roles:'Admin · Ambassador', color:'#a855f7'},
      {sub:'franchise',  icon:'🏢', name:'Franchise Partner',   desc:'Branch dashboard, enrolments, revenue share.',      roles:'Admin · Partner', color:'#0ea5a3'},
      {sub:'accounts',   icon:'💼', name:'Accounts & Admin',    desc:'Cash ledger, expense approvals, staff.',            roles:'Admin · Employee', color:'#f59e0b'},
      {sub:'college',    icon:'🏫', name:'College Partner',     desc:'Partner colleges, cohorts, placements.',            roles:'Admin · Employee', color:'#22c55e'}
    ];
    var grid = document.getElementById('grid');
    portals.forEach(function(p){
      var a = document.createElement('a');
      a.className = 'card'; a.href = url(p.sub);
      a.innerHTML =
        '<div class="top"><div class="ic" style="background:'+p.color+'22;color:'+p.color+'">'+p.icon+'</div>'+
        '<h3>'+p.name+'</h3></div>'+
        '<p>'+p.desc+'</p>'+
        '<div class="roles">'+p.roles+'</div>'+
        '<div class="go">Open '+p.name+' &rarr;</div>';
      grid.appendChild(a);
    });
  </script>
</body>
</html>
